<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>exoverse.fr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .domain {
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #ccc;
      margin: 1.5rem auto;
    }
    .message {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .contact {
      display: inline-block;
      font-size: 1rem;
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 2px;
    }
    .contact:hover {
      color: #555;
      border-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="domain">exoverse.fr</div>
    <div class="divider"></div>
    <p class="message">Ce nom de domaine vous intéresse ?</p>
    <a class="contact" href="mailto:compta.vpp@gmail.com">compta.vpp@gmail.com</a>
  </div>
</body>
</html>
